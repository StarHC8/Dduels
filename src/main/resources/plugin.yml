name: Dduels
version: '${version}'

main: org.starhc.dduels.Dduels
api-version: '1.21'
load: POSTWORLD
softdepend: [PartyManager]
commands:
  duel:
    description: Main command.
  duelaccept:
    description: Command to accept duel.
    aliases:
      - accept
  leave:
    description: Command to leave a duel.
    aliases:
      - l
  spectate:
    description: Command to spectate a duel.
    aliases:
      - spect
  stats:
    description: Command to see a player's stats.
  partyduel:
    description: Command to create a duel with all the member of the party.
    aliases:
      - pd